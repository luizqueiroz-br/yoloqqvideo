{% extends "detector/base.html" %}

{% block title %}Login | VisionQQ{% endblock %}

{% block content %}
<section class="card" style="max-width: 420px; margin: 60px auto;">
    <h1 style="margin-top:0;">Entrar no VisionQQ</h1>
    <p class="muted">Use seu usuario do Django para acessar o dashboard.</p>

    {% if form.errors %}
        <div style="color:#ffb4b4; margin-bottom:12px;">Usuario ou senha invalidos.</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div style="display:grid; gap:10px;">
            <label for="id_username">Usuario</label>
            <input id="id_username" name="username" type="text" required style="padding:10px; border-radius:10px; border:1px solid #284469; background:#0d1e33; color:#edf3ff;">

            <label for="id_password">Senha</label>
            <input id="id_password" name="password" type="password" required style="padding:10px; border-radius:10px; border:1px solid #284469; background:#0d1e33; color:#edf3ff;">

            <button class="btn" type="submit" style="margin-top:6px;">Entrar</button>
        </div>
    </form>
</section>
{% endblock %}
